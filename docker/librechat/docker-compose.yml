# LibreChat Docker Stack
#
# Multi-provider chat UI with MongoDB for conversations and
# Meilisearch for conversation search indexing.
#
# Prerequisites:
#   - External Docker network (e.g., claudebox-net) already created
#   - .env file with ANTHROPIC_API_KEY, MEILI_MASTER_KEY, and web search vars
#   - librechat.yaml mounted into the container
#
# See docs/components/librechat.md for full setup context.

services:
  librechat:
    image: ghcr.io/danny-avila/librechat:v0.8.3
    container_name: librechat
    environment:
      - MONGO_URI=mongodb://mongodb:27017/LibreChat
      - MEILI_HOST=http://meilisearch:7700
    env_file:
      - .env
    volumes:
      - /opt/appdata/librechat/librechat/librechat.yaml:/app/librechat.yaml
      - /opt/appdata/librechat/librechat/data:/app/data
      - /opt/appdata/librechat/librechat/images:/app/client/public/images
      - /opt/appdata/librechat/librechat/logs:/app/api/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - mongodb
      - meilisearch
    networks:
      - your-network  # Replace with your shared Docker network
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: librechat-mongodb
    volumes:
      - /opt/appdata/librechat/mongodb:/data/db
    networks:
      - your-network
    restart: unless-stopped

  backrest-mcp:
    image: ghcr.io/supercorp-ai/supergateway:latest
    container_name: librechat-backrest-mcp
    command: >
      --stdio "node /app/build/src/index.js"
      --outputTransport streamableHttp
      --port 8000
    volumes:
      - /path/to/backrest-mcp-server:/app  # path to cloned backrest-mcp-server repo
    environment:
      - BACKREST_URL=http://host.docker.internal:9898
      - BACKREST_USERNAME=YOUR_BACKREST_USERNAME
      - BACKREST_PASSWORD=${BACKREST_MCP_PASSWORD}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - your-network
    restart: unless-stopped

  grafana-mcp:
    image: mcp/grafana:latest
    container_name: librechat-grafana-mcp
    command: ["-t", "streamable-http"]
    environment:
      - GRAFANA_URL=http://YOUR_GRAFANA_HOST:3000
      - GRAFANA_SERVICE_ACCOUNT_TOKEN=${GRAFANA_SERVICE_ACCOUNT_TOKEN}
    networks:
      - your-network
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1.37.0
    container_name: librechat-meilisearch
    environment:
      - MEILI_NO_ANALYTICS=true
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
    env_file:
      - .env
    volumes:
      - /opt/appdata/librechat/meilisearch:/meili_data
    networks:
      - your-network
    restart: unless-stopped

  librechat-exporter:
    image: ghcr.io/virtuos/librechat_exporter:main
    container_name: librechat-exporter
    environment:
      - MONGODB_URI=mongodb://YOUR_MONGO_USER:YOUR_MONGO_PASSWORD@mongodb:27017/?authSource=admin
      - LOGGING_LEVEL=info
    expose:
      - "8000"
    depends_on:
      - mongodb
    networks:
      - your-network  # Replace with your shared Docker network
    restart: unless-stopped

networks:
  your-network:
    external: true
