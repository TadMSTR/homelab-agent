# Open Notebook — AI research and notebook tool
#
# Document analysis and research tool with a Streamlit web UI and REST API.
# Uses SurrealDB as its backend database with GraphQL support.
# https://github.com/lfnovo/open_notebook
#
# Two ports: 8502 (Streamlit UI) and 5055 (REST API). If proxying through
# SWAG, route the UI and API to different location blocks (see component doc).

services:
  surrealdb:
    image: surrealdb/surrealdb:v2
    container_name: open-notebook-surrealdb
    command: >
      start --log info
      --user root
      --pass ${SURREAL_PASSWORD}
      rocksdb:/mydata/mydatabase.db
    user: root
    environment:
      - SURREAL_EXPERIMENTAL_GRAPHQL=true
    volumes:
      - /opt/appdata/open-notebook/surrealdb:/mydata
    networks:
      - your-network  # Replace with your shared Docker network
    restart: unless-stopped

  open-notebook:
    image: lfnovo/open_notebook:v1-latest
    container_name: open-notebook
    ports:
      - "8502:8502"   # Streamlit web UI
      - "5055:5055"   # REST API
    environment:
      - OPEN_NOTEBOOK_ENCRYPTION_KEY=${ENCRYPTION_KEY}   # Generate with: openssl rand -hex 32
      - SURREAL_URL=ws://open-notebook-surrealdb:8000/rpc
      - SURREAL_USER=root
      - SURREAL_PASSWORD=${SURREAL_PASSWORD}             # Must match surrealdb service
      - SURREAL_NAMESPACE=open_notebook
      - SURREAL_DATABASE=open_notebook
    volumes:
      - /opt/appdata/open-notebook/data:/app/data
    depends_on:
      - surrealdb
    networks:
      - your-network  # Replace with your shared Docker network
    restart: unless-stopped

networks:
  your-network:
    external: true
