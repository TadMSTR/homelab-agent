services:
  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    restart: unless-stopped
    ports:
      - "127.0.0.1:8086:8086"
    volumes:
      - /opt/appdata/grafana/influxdb-data:/var/lib/influxdb2
      - /opt/appdata/grafana/influxdb-config:/etc/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_ADMIN_USER}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_ADMIN_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_ADMIN_TOKEN}
    networks:
      - claudebox-net

  grafana:
    image: grafana/grafana:11.6.0
    container_name: grafana
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "127.0.0.1:3025:3000"
    volumes:
      - /opt/appdata/grafana/grafana-data:/var/lib/grafana
      - /opt/appdata/grafana/grafana-provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=https://grafana.yourdomain
      - GF_PLUGINS_PREINSTALL=marcusolsson-dynamictext-panel,volkovlabs-echarts-panel,yesoreyeram-infinity-datasource,grafana-clock-panel
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SECURITY_COOKIE_SECURE=true
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_RENDERING_SERVER_URL=http://grafana-image-renderer:8081/render
      - GF_RENDERING_CALLBACK_URL=http://grafana:3000/
      - GF_LOG_FILTERS=rendering:debug
    depends_on:
      - influxdb
    networks:
      - claudebox-net

  loki:
    image: grafana/loki:3.6.8
    container_name: loki
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - /opt/appdata/grafana/loki-config/loki-config.yml:/etc/loki/local-config.yaml:ro
      - /opt/appdata/grafana/loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - claudebox-net

  grafana-image-renderer:
    image: grafana/grafana-image-renderer:latest
    container_name: grafana-image-renderer
    restart: unless-stopped
    environment:
      - ENABLE_METRICS=true
    networks:
      - claudebox-net

networks:
  claudebox-net:
    external: true
