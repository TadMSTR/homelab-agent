services:
  nats:
    image: nats:2.12.6-alpine
    container_name: nats
    restart: unless-stopped
    command: ["--config", "/etc/nats/nats-server.conf"]
    ports:
      - "127.0.0.1:4222:4222"   # client connections
      - "127.0.0.1:8222:8222"   # HTTP monitoring dashboard
    volumes:
      - ./nats-server.conf:/etc/nats/nats-server.conf:ro
      - /opt/appdata/nats/data:/data
    networks:
      - claudebox-net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  claudebox-net:
    external: true
