# Graphiti MCP Server Configuration
# Based on config-docker-neo4j.yaml from image, customized for homelab

server:
  transport: "http"
  host: "0.0.0.0"
  port: 8000

llm:
  provider: "anthropic"
  model: "claude-sonnet-4-6"
  temperature: 1.0
  max_tokens: 4096

  providers:
    anthropic:
      api_key: ${ANTHROPIC_API_KEY}
      api_url: ${ANTHROPIC_API_URL:https://api.anthropic.com}
      max_retries: 3

embedder:
  provider: "openai"
  model: "bge-m3"
  dimensions: 1024

  providers:
    openai:
      api_key: ${OPENAI_API_KEY}
      api_url: ${OLLAMA_EMBEDDINGS_URL}  # e.g., http://your-ollama-host/v1

database:
  provider: "neo4j"

  providers:
    neo4j:
      uri: ${NEO4J_URI:bolt://neo4j:7687}
      username: ${NEO4J_USER:neo4j}
      password: ${NEO4J_PASSWORD}
      database: ${NEO4J_DATABASE:neo4j}
      use_parallel_runtime: ${USE_PARALLEL_RUNTIME:false}

graphiti:
  group_id: ${GRAPHITI_GROUP_ID:homelab}
  episode_id_prefix: ${EPISODE_ID_PREFIX:}
  user_id: ${USER_ID:mcp_user}
  entity_types:
    - name: "Service"
      description: "A running service, container, or application in the homelab"
    - name: "Host"
      description: "A physical or virtual machine"
    - name: "Network"
      description: "A network, subnet, VLAN, or Docker network"
    - name: "Configuration"
      description: "A configuration file, setting, or parameter"
    - name: "Agent"
      description: "A Claude Code agent or automated process"
    - name: "User"
      description: "A human user or account"
    - name: "Port"
      description: "A network port or port mapping"
