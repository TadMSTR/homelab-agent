services:
  neo4j:
    image: neo4j:5.26.23
    container_name: neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD}
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 512m
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    volumes:
      - /opt/appdata/graphiti/neo4j/data:/data
      - /opt/appdata/graphiti/neo4j/logs:/logs
    networks:
      - claudebox-net
      - graphiti-internal
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  graphiti-mcp:
    # Pinned: 1.0.2-standalone bundles graphiti-core 0.28.2 (CVE-2026-32247 fixed).
    # Tag immutability enabled on Docker Hub — this tag won't silently change.
    # To upgrade: check https://hub.docker.com/r/zepai/knowledge-graph-mcp/tags
    # To build from source if needed:
    #   git clone https://github.com/getzep/graphiti && cd graphiti/mcp_server
    #   docker build -f docker/Dockerfile.standalone --build-arg GRAPHITI_CORE_VERSION=0.28.2 -t graphiti-mcp:standalone .
    build: .
    image: graphiti-mcp:local
    container_name: graphiti-mcp
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_DATABASE: neo4j
      GRAPHITI_GROUP_ID: ${GRAPHITI_GROUP_ID:-homelab}
      SEMAPHORE_LIMIT: 5
      CONFIG_PATH: /app/mcp/config/config.yaml
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./config.yaml:/app/mcp/config/config.yaml:ro
    env_file:
      - .env
    networks:
      - graphiti-internal

networks:
  claudebox-net:
    external: true
  graphiti-internal:
    driver: bridge
