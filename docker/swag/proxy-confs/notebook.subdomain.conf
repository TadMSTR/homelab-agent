# Open Notebook — AI-powered research notebook (Streamlit frontend + FastAPI backend)
# Two location blocks: frontend on 8502 (Streamlit/WebSocket) and API on 5055.
# https://github.com/lfnovo/open-notebook

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name notebook.yourdomain;

    include /config/nginx/ssl.conf;

    # Authelia SSO
    include /config/nginx/authelia-server.conf;

    location / {
        # Authelia SSO
        include /config/nginx/authelia-location.conf;

        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;
        set $upstream_app open-notebook;
        set $upstream_port 8502;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;

        # WebSocket support for Streamlit
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
    }

    # Open Notebook API — used internally by the frontend for health checks and data ops
    location /config {
        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;
        set $upstream_app open-notebook;
        set $upstream_port 5055;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;
    }
}
