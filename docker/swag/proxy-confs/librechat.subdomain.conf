# LibreChat — multi-provider AI chat UI
# https://github.com/danny-avila/LibreChat

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name chat.yourdomain;

    include /config/nginx/ssl.conf;

    # Authelia SSO
    include /config/nginx/authelia-server.conf;

    location / {
        # Authelia SSO
        include /config/nginx/authelia-location.conf;

        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;
        set $upstream_app librechat;
        set $upstream_port 3080;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;
    }

    # Metrics endpoint — no Authelia, internal access only
    location /metrics {
        allow 192.168.1.0/24;
        allow 10.10.1.0/24;
        deny all;

        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;
        set $upstream_app librechat-exporter;
        set $upstream_port 8000;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port/metrics;
    }
}
