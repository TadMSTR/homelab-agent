# SWAG dashboard — internal status page, no SSO, LAN-only IP allowlist.
# This is the unmodified linuxserver.io sample — no customization needed.
# The dashboard serves on port 81 (http) and 443 (https), LAN access only.

## Version 2024/07/27
# make sure that your dns has a cname set for dashboard

server {
    listen 81;

    server_name _;

    root /dashboard/www;
    index index.php;

    client_max_body_size 0;

    location / {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        try_files $uri $uri/ /index.php$is_args$args =404;
    }

    location ~ ^(.+\.php)(.*)$ {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        fastcgi_split_path_info ^(.+\.php)(.*)$;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include /etc/nginx/fastcgi_params;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name dashboard.*;

    root /dashboard/www;
    index index.php;

    include /config/nginx/ssl.conf;

    client_max_body_size 0;

    location / {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        try_files $uri $uri/ /index.php$is_args$args =404;
    }

    location ~ ^(.+\.php)(.*)$ {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        fastcgi_split_path_info ^(.+\.php)(.*)$;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include /etc/nginx/fastcgi_params;
    }
}
