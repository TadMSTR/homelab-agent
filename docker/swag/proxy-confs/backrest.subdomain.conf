# Backrest — restic backup manager (native install, cross-host proxy)
# Backrest runs natively on the host, not in Docker — proxy to host IP instead of container name.
# https://github.com/garethgeorge/backrest

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name backrest.yourdomain;

    include /config/nginx/ssl.conf;

    # Authelia SSO
    include /config/nginx/authelia-server.conf;

    location / {
        # Authelia SSO
        include /config/nginx/authelia-location.conf;

        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;
        set $upstream_app 192.168.1.x;
        set $upstream_port 9898;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;
    }
}
