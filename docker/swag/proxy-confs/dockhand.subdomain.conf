# Dockhand — Docker container manager
# Needs WebSocket support for live container logs and terminal access.
# https://github.com/bcicen/dockhand

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name dockhand.yourdomain;

    include /config/nginx/ssl.conf;

    # Authelia SSO
    include /config/nginx/authelia-server.conf;

    location / {
        # Authelia SSO
        include /config/nginx/authelia-location.conf;

        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;
        set $upstream_app dockhand;
        set $upstream_port 3000;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;

        # WebSocket support for live container logs/terminal
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
    }
}
