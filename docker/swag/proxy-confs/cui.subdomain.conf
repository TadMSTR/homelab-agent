# Claude Code UI (CUI) — web interface for Claude Code
# Cross-host proxy — CUI runs natively on the host, not in Docker.
# Needs WebSocket (streaming output) and SSE (Claude response streaming).
# https://github.com/anthropics/claude-code

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name cui.yourdomain;

    include /config/nginx/ssl.conf;

    # Authelia SSO
    include /config/nginx/authelia-server.conf;

    location / {
        # Authelia SSO
        include /config/nginx/authelia-location.conf;

        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;
        set $upstream_app 192.168.1.x;
        set $upstream_port 3001;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;

        # WebSocket support (streaming output)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;

        # SSE support for streaming Claude Code output
        proxy_buffering off;
        proxy_cache off;
    }
}
