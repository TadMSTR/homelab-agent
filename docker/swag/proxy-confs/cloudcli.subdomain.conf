## CloudCLI reverse proxy configuration
##
## CloudCLI uses WebSockets for the chat interface. The /ws path MUST be
## handled in a separate location block with explicit WebSocket headers —
## the standard proxy.conf include sets Connection: "" which kills the upgrade.
##
## The /ws block is also exempt from Authelia: auth_request triggers a
## subrequest that WebSocket upgrades cannot pass through. CloudCLI's own
## JWT handles authentication for that endpoint.
##
## See: docs/components/cloudcli.md for full setup notes and gotchas.

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name cloudcli.yourdomain.*;

    include /config/nginx/ssl.conf;
    include /config/nginx/authelia-server.conf;

    location / {
        include /config/nginx/authelia-location.conf;
        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;
        set $upstream_app  YOUR_HOST_IP;
        set $upstream_port 3004;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;
    }

    # WebSocket path — separate block, exempt from Authelia
    location /ws {
        include /config/nginx/resolver.conf;
        set $upstream_app  YOUR_HOST_IP;
        set $upstream_port 3004;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}
